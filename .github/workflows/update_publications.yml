name: Update Publications

on:
  schedule:
    - cron: "0 0 * * *"  # Every day at midnight UTC

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Public Repo
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Clone Private Publications Repo using HTTPS
      run: |
        git clone https://${{ secrets.PUBLICATIONS_PAT }}@github.com/oesteban/publications_index.git ~/publications_index

    - name: Update publications
      run: |
        python .maint/checkout_pubs.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add _data/pub_journal.yml _data/pub_conference.yml _data/pub_other.yml
        git commit -m "Nightly Update of Publications Database" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
